services:
  council-talk:
    build:
      context: .
      dockerfile: Dockerfile
    image: council-talk:latest
    container_name: council-talk
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-counciltalk}"
      ADMIN_TOKEN: "${ADMIN_TOKEN:-}"
      DATA_DIR: /app/data
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_SECURE: "${SMTP_SECURE:-false}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
      DAISU_AI_ENABLED: "${DAISU_AI_ENABLED:-true}"
      DAISU_AI_PROVIDER: "${DAISU_AI_PROVIDER:-openai}"
      DAISU_AI_API_KEY: "${DAISU_AI_API_KEY:-}"
      DAISU_AI_API_URL: "${DAISU_AI_API_URL:-https://api.openai.com/v1/chat/completions}"
      DAISU_AI_MODEL: "${DAISU_AI_MODEL:-gpt-4.1-mini}"
      DAISU_AI_TIMEOUT_MS: "${DAISU_AI_TIMEOUT_MS:-10000}"
    ports:
      - "${APP_HOST:-0.0.0.0}:${APP_PORT:-8792}:3000"
    volumes:
      - ./data:/app/data
